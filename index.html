<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="color-scheme" content="light">
    <meta name="theme-color" content="#eef3f8">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>联通沃派—有梦有方向主题小游戏</title>
    <link rel="preload" as="image" href="assets/runner-cutout.png">
    <link rel="preload" as="image" href="assets/desk-chair-cutout.png">
    <link rel="preload" as="image" href="assets/coin.png">
    <link rel="preload" as="image" href="assets/rainbow-tail.jpg">
    <link rel="preload" as="audio" href="assets/background-music.mp3" type="audio/mpeg">
    <link rel="preload" as="audio" href="assets/ground-sfx.mp3" type="audio/mpeg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell">
      <header class="topbar" aria-label="game status">
        <div>
          <h1>联通沃派—有梦有方向主题小游戏</h1>
          <p id="tagline">Run forward, move left/right on the track, dodge blocks, collect coins.</p>
        </div>
        <div class="scoreboard">
          <button id="langToggle" class="lang-toggle" type="button" aria-label="Switch language">中文</button>
          <span><span id="distanceLabel">Distance</span> <strong id="distance">0</strong>m</span>
          <span><span id="coinsLabel">Coins</span> <strong id="coins">0</strong></span>
          <span><span id="scoreLabel">Score</span> <strong id="score">0</strong></span>
        </div>
      </header>

      <section class="stage-wrap">
        <canvas id="game" width="960" height="420" aria-label="联通沃派—有梦有方向主题小游戏"></canvas>
        <div id="overlay" class="overlay">
          <div class="overlay-panel">
            <h2 id="overlayTitle">Press Space or Up to Start</h2>
            <p id="overlayText">Up jumps, Down ducks, Left/Right move on the track. Coins are worth 10 points.</p>
            <button id="startBtn" type="button">Start Game</button>
          </div>
        </div>
        <nav class="touch-controls" aria-label="touch controls">
          <button class="touch-left" type="button" data-key="ArrowLeft" aria-label="Left">←</button>
          <button class="touch-down" type="button" data-key="ArrowDown" aria-label="Duck">↓</button>
          <button class="touch-up" type="button" data-key="ArrowUp" aria-label="Jump">↑</button>
          <button class="touch-right" type="button" data-key="ArrowRight" aria-label="Right">→</button>
        </nav>
      </section>
    </main>
    <div id="orientationGate" class="orientation-gate" aria-hidden="true">
      <div class="orientation-card">
        <div class="orientation-icon">↻</div>
        <strong>请横屏游玩</strong>
        <span>将手机旋转为横屏后继续游戏</span>
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
